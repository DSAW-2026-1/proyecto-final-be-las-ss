name: Deploy to Azure VM

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # Browser-reachable Express URL; baked into Next at `web` image build (docker-compose build args).
          WEB_NEXT_PUBLIC_API_URL: ${{ vars.WEB_NEXT_PUBLIC_API_URL }}
          # Comma-separated browser origins allowed by Express CORS (e.g. http://YOUR_VM_IP:3000).
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        with:
          host: ${{ secrets.AZ_VM_HOST }}
          username: ${{ secrets.AZ_VM_USER }}
          key: ${{ secrets.AZ_VM_SSH_KEY }}
          envs: JWT_SECRET,WEB_NEXT_PUBLIC_API_URL,CORS_ORIGIN
          script_stop: true
          script: |
            set -e
            export JWT_SECRET
            export WEB_NEXT_PUBLIC_API_URL
            export CORS_ORIGIN

            # Strip accidental newlines/CR from pasted repository variables
            WEB_NEXT_PUBLIC_API_URL="$(printf '%s' "$WEB_NEXT_PUBLIC_API_URL" | head -n1 | tr -d '\r')"
            export WEB_NEXT_PUBLIC_API_URL
            CORS_ORIGIN="$(printf '%s' "$CORS_ORIGIN" | head -n1 | tr -d '\r')"
            export CORS_ORIGIN

            if [ -z "$JWT_SECRET" ] || [ "${#JWT_SECRET}" -lt 32 ]; then
              echo "JWT_SECRET must be set (GitHub secret) and at least 32 characters (see auth.service.ts)."
              exit 1
            fi

            if [ -z "$WEB_NEXT_PUBLIC_API_URL" ]; then
              echo "ERROR: Set repository variable WEB_NEXT_PUBLIC_API_URL (e.g. http://YOUR_VM_IP:3001) so the web bundle calls the public API, not localhost."
              exit 1
            fi

            if [ -z "$CORS_ORIGIN" ]; then
              echo "ERROR: Set repository variable CORS_ORIGIN (e.g. http://YOUR_VM_IP:3000). Comma-separated for multiple origins. Required for API CORS in production (see apps/api/src/config/cors.ts)."
              exit 1
            fi

            APP_DIR="${{ secrets.AZ_VM_APP_DIR }}"

            if [ -z "$APP_DIR" ]; then
              echo "Missing required secret: AZ_VM_APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout master
            git reset --hard origin/master

            # docker-compose reads apps/api/.env — merge secrets/vars from GitHub (file is gitignored on the VM).
            ENV_FILE="apps/api/.env"
            mkdir -p apps/api
            touch "$ENV_FILE"
            if grep -q '^JWT_SECRET=' "$ENV_FILE" 2>/dev/null; then
              echo "Removing existing JWT_SECRET from $ENV_FILE"
              # grep -v exits 1 when nothing is printed (e.g. .env only contained JWT_SECRET); || true avoids set -e abort.
              grep -v '^JWT_SECRET=' "$ENV_FILE" >"${ENV_FILE}.tmp" || true
              mv "${ENV_FILE}.tmp" "$ENV_FILE" || { echo "ERROR: mv failed"; exit 1; }
            fi
            if grep -q '^CORS_ORIGIN=' "$ENV_FILE" 2>/dev/null; then
              echo "Removing existing CORS_ORIGIN from $ENV_FILE"
              grep -v '^CORS_ORIGIN=' "$ENV_FILE" >"${ENV_FILE}.tmp" || true
              mv "${ENV_FILE}.tmp" "$ENV_FILE" || { echo "ERROR: mv failed"; exit 1; }
            fi
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >>"$ENV_FILE"
            printf 'CORS_ORIGIN=%s\n' "$CORS_ORIGIN" >>"$ENV_FILE"
            chmod 600 "$ENV_FILE" || true

            docker compose up -d --build --remove-orphans
            docker compose ps

            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health/db >/dev/null; then
                echo "API health check passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "API health check failed after retries."
                docker compose logs --tail=200 api
                exit 1
              fi
              sleep 2
            done

            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3000 >/dev/null; then
                echo "Web health check passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Web health check failed after retries."
                docker compose logs --tail=200 web
                exit 1
              fi
              sleep 2
            done

            echo "Deployment and smoke checks succeeded."
